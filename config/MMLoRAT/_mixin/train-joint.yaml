- path: "run.data.train.source"
  value:
    type: "dataset"
    parameters: !include "../../_dataset/train-joint.yaml"

- path: "common.normalization"
  action: "replace"
  value: "joint"

- path: "run.data.train.sampler.weight"
  action: "replace"
  value:
    - match:
        type: "dataset"
        name: "LasHeR"
      value: 4.0
    - match:
        type: "dataset"
        name_regex: "GOT-10k"
      value: 1.0
    - match:
        type: "dataset"
        name: "LaSOT"
      value: 1.0
    - match:
        type: "dataset"
        name: "TrackingNet"
      value: 1.0
    - match:
        type: "dataset"
        name_regex: "COCO"
      value: 1.0